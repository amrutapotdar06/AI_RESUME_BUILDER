<!DOCTYPE html>
<html>
<head>
    <title>Resume Preview</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="resume-body">

<div class="resume-card">

    <div class="header">
        <h1>{{ data.name }}</h1>
        <p>{{ data.jobrole }}</p>
        <p>{{ data.email }}</p>
    </div>

    <div class="section">
        <h2>Professional Summary</h2>
        <p>{{ summary }}</p>
    </div>

    <div class="section">
        <h2>Skills</h2>
        <p>{{ data.skills }}</p>
    </div>

    <div class="section">
        <h2>Education</h2>
        <p>{{ data.education }}</p>
    </div>

    <div class="section">
        <h2>Projects</h2>
        <p>{{ data.projects }}</p>
    </div>

    <div class="section">
        <h2>Experience</h2>
        <p>{{ data.experience }}</p>
    </div>

</div>

<a href="/download">
    <button class="primary-btn">Download PDF</button>
</a>

</body>
</html>
