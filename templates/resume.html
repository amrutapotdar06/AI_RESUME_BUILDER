<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Resume Builder | AI Resume Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Top Navigation -->
<div class="top-nav">
    <div class="logo">AI Resume Studio</div>
    <div>
        <a href="/" class="nav-btn">Home</a>
        <button onclick="generateResume()" class="nav-btn primary">Generate</button>
        <button onclick="downloadPDF()" class="nav-btn">Download PDF</button>
    </div>
</div>

<!-- Main Layout -->
<div class="main-container">

    <!-- LEFT SIDE: FORM -->
    <div class="form-card">
        <h2>Build Your Resume</h2>

        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="role" placeholder="Job Role">

        <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
        <textarea id="education" placeholder="Education Details"></textarea>
        <textarea id="projects" placeholder="Projects Description"></textarea>
        <textarea id="experience" placeholder="Work Experience"></textarea>
    </div>

    <!-- RIGHT SIDE: LIVE PREVIEW -->
    <div class="preview-card">
        <h2>Live Preview</h2>

        <div id="resumePreview" class="resume-preview-box">
            <p style="color:gray;">Your generated resume will appear here...</p>
        </div>

        <div id="coverPreview" class="cover-preview-box"></div>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
