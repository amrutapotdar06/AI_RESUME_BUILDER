<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Portfolio Builder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="top-nav">
    <div class="logo">AI Resume Studio</div>
    <div>
        <a href="/" class="nav-btn">Home</a>
        <button onclick="generatePortfolio()" class="nav-btn primary">Generate Portfolio</button>
    </div>
</div>

<div class="main-container">

    <div class="form-card">
        <h2>Create Portfolio</h2>

        <input type="text" id="p_name" placeholder="Your Name">
        <textarea id="p_about" placeholder="About You"></textarea>
        <textarea id="p_skills" placeholder="Skills"></textarea>
        <textarea id="p_projects" placeholder="Projects"></textarea>
    </div>

    <div class="preview-card">
        <h2>Portfolio Preview</h2>
        <div id="portfolioPreview"></div>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
